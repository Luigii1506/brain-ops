body: |
  Aristóteles (Ἀριστοτέλης), conocido como "El Estagirita" por su ciudad
  natal y "El Filósofo" por antonomasia, fue un filósofo, polímata y
  científico griego nacido en 384 a.C. en Estagira, Macedonia. Estudió
  20 años con [[Platón]] en la Academia de Atenas, fue tutor de
  [[Alejandro Magno]] por encargo de [[Filipo II de Macedonia]], y fundó
  el Liceo (escuela peripatética) donde enseñó durante 13 años.

  Autor de obras fundacionales como la *[[Ética a Nicómaco]]* y
  *[[Metafísica (Aristóteles)|Metafísica]]*. Crítico de la teoría de
  las Formas de Platón, reaccionó contra el idealismo platónico en
  favor de un empirismo metafísico.

existing_typed:
