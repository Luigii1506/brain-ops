    object: Tomás de Aquino
    reason: "dirección invertida — Tomás es posterior"
  # Averroes no fue alumno directo de Aristóteles (1500 años de diferencia).
  - predicate: studied_under
    object: Aristóteles
    reason: "absurdo temporal — Aristóteles vivió 1500 años antes"

