must_catch:
  # 2.2A completamente skipped esto:
  - [influenced_by, Aristóteles]   # "comentarista más importante de Aristóteles"
  - [influenced, Tomás de Aquino]  # "Su influencia sobre Tomás de Aquino es profunda"

must_not_propose:
