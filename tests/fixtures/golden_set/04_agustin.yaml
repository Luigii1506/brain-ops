body: |
  Agustín de Hipona (354–430 d.C.), conocido como San Agustín, fue el
  filósofo y teólogo más influyente del cristianismo latino. Nacido en
  Tagaste (actual Souk Ahras, Argelia), hijo de padre pagano y madre
  cristiana (Mónica), pasó por el maniqueísmo, el escepticismo
  académico y el neoplatonismo antes de convertirse al cristianismo
  en 386 d.C.

  Como obispo de Hipona durante 35 años, construyó el marco intelectual
  del cristianismo medieval. Sus obras cumbres — *Confesiones* y *La
  ciudad de Dios* — definieron la teología cristiana durante mil años.

  Fue influenciado por [[Platón]] a través del neoplatonismo de
  [[Plotino]], aunque reinterpretó radicalmente la metafísica
  platónica en clave cristiana. Su sistema teológico influyó
  posteriormente en [[Tomás de Aquino]], quien lo llama "Agustín"
  por antonomasia.

